<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Dense layout — gaps run small (0.25rem → 2rem)" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .s { display: grid; gap: 8px; justify-items: center; }
  .bar { background: var(--accent); border-radius: 3px; width: 100%; }
  .s .cell { width: 40px; display: flex; align-items: flex-end; height: 56px; }
  .s b { color: var(--text); font-size: 0.66rem; font-weight: 800; }
  .s span { color: var(--muted); font-size: 0.58rem; }
</style>
</head>
<body>
  <div class="row">
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-1)"></div></div><b>1</b><span>0.25</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-2)"></div></div><b>2</b><span>0.35</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-3)"></div></div><b>3</b><span>0.55</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-4)"></div></div><b>4</b><span>0.65</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-5)"></div></div><b>5</b><span>0.75</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-6)"></div></div><b>6</b><span>0.9</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-8)"></div></div><b>8</b><span>1.3</span></div>
    <div class="s"><div class="cell"><div class="bar" style="height:var(--space-10)"></div></div><b>10</b><span>2.0</span></div>
  </div>
</body>
</html>
