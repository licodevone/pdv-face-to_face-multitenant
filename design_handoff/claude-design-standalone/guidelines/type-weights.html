<!-- @dsCard group="Type" viewport="700x150" name="Weight scale" subtitle="Inter 400 → 900; the brand leans heavy (800/900)" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); color: var(--text); }
  .row { display: flex; gap: 20px; flex-wrap: wrap; align-items: baseline; }
  .w { display: grid; gap: 2px; }
  .w b { font-size: 1.5rem; letter-spacing: -0.03em; }
  .w span { color: var(--muted); font-size: 0.62rem; font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><b style="font-weight:400">Aa</b><span>400 Regular</span></div>
    <div class="w"><b style="font-weight:600">Aa</b><span>600 Medium</span></div>
    <div class="w"><b style="font-weight:700">Aa</b><span>700 Semibold</span></div>
    <div class="w"><b style="font-weight:800">Aa</b><span>800 Bold</span></div>
    <div class="w"><b style="font-weight:900">Aa</b><span>900 Black</span></div>
  </div>
</body>
</html>
