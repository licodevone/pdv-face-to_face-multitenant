<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Inter, tight negative tracking, near-1.0 leading" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); color: var(--text); }
  .stack { display: grid; gap: 12px; }
  .d  { font-size: 3.4rem; font-weight: 900; letter-spacing: var(--tracking-tight); line-height: 0.9; }
  .h1 { font-size: var(--text-2xl); font-weight: 800; letter-spacing: var(--tracking-snug); }
  .h2 { font-size: var(--text-xl); font-weight: 800; letter-spacing: var(--tracking-snug); }
  .h3 { font-size: var(--text-lg); font-weight: 700; letter-spacing: var(--tracking-snug); }
  .tag { color: var(--muted); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="stack">
    <div><div class="d">Face Delivery</div><div class="tag">DISPLAY · 900 · -0.06em</div></div>
    <div><div class="h1">Frente de caixa</div><div class="tag">H1 · 1.9rem · 800 · -0.04em</div></div>
    <div><div class="h2">Resumo do caixa</div><div class="tag">H2 · 1.55rem · 800</div></div>
    <div><div class="h3">Produtos ativos</div><div class="tag">H3 · 1.3rem · 700</div></div>
  </div>
</body>
</html>
