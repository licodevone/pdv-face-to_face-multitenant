name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Permite disparar manualmente pela aba "Actions" no GitHub

jobs:
  build-msi:
    runs-on: windows-latest   # Necessário Windows nativo para rodar o WiX Toolset

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o WiX Toolset v3 exigido pelo @electron-forge/maker-wix
      - name: Instalar WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          # Localiza e injeta o candle.exe/light.exe no PATH dos passos seguintes
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
                    Select-Object -First 1
          if ($wixBin) {
            Write-Host "WiX bin encontrado em: $wixBin"
            Add-Content -Path $env:GITHUB_PATH -Value $wixBin
          } else {
            Write-Warning "candle.exe nao encontrado apos instalar WiX"
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Instalar dependências (raiz)
        # Instalamos ignorando scripts automáticos para evitar bloqueios de segurança do pnpm v10 no CI
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Forçar Download Limpo do Binário do Electron
        shell: pwsh
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
        run: |
          # Limpa caches corrompidos que o pnpm traz do storage compartilhado
          Remove-Item -Recurse -Force node_modules/electron/dist -ErrorAction SilentlyContinue
          Remove-Item -Force node_modules/electron/path.txt -ErrorAction SilentlyContinue
          
          # Dispara o script oficial de instalação do Electron isoladamente via Node.js
          node node_modules/electron/install.js
          
          # Validação de segurança: se falhar o download, o pipeline para aqui com aviso claro
          $exePresente = Test-Path node_modules/electron/dist/electron.exe
          if (-not $exePresente) {
            Write-Error "::error::O arquivo electron.exe nao foi baixado pelo install.js!"
            exit 1
          } else {
            Write-Host "✅ Binário electron.exe validado com sucesso!"
          }

      - name: Gerar artefatos do Prisma ORM
        run: pnpm db:generate
        env:
          # String temporária necessária apenas para validar a compilação das tipagens do Prisma
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pdv_db"

      - name: Build (backend + frontend + desktop)
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Gerar instalador .msi
        env:
          DEBUG: electron-forge:*
        shell: pwsh
        run: |
          pnpm run make:win
          Write-Host "=== Processo de empacotamento concluído com código: $LASTEXITCODE ==="

      - name: Diagnóstico pós-build (Lista arquivos gerados)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path out) {
            Write-Host "=== Conteúdo da pasta out/make ==="
            Get-ChildItem -Recurse out\make -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            Write-Host "A pasta de saída 'out' nao foi gerada pelo Electron Forge."
          }

      - name: Publicar instaladores como artefato do GitHub
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-face-delivery-installers
          path: |
            out/make/**/*.msi
            out/make/**/*.exe
          if-no-files-found: error
