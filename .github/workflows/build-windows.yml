name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Permite disparar manualmente pela aba "Actions" no GitHub

jobs:
  build-msi:
    runs-on: windows-latest   # Necessário Windows nativo para rodar o WiX Toolset

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o WiX Toolset v3 exigido pelo @electron-forge/maker-wix
      - name: Instalar WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          # Localiza e injeta o candle.exe/light.exe no PATH dos passos seguintes
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
                    Select-Object -First 1
          if ($wixBin) {
            Write-Host "WiX bin encontrado em: $wixBin"
            Add-Content -Path $env:GITHUB_PATH -Value $wixBin
          } else {
            Write-Warning "candle.exe nao encontrado apos instalar WiX"
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # REMOVIDO O CACHE AUTOMÁTICO DO PNPM PARA LIMPAR O AMBIENTE DE BUILDS ANTERIORES CORROMPIDOS

      - name: Configurar pnpm para Isolamento Total (Hoisted)
        shell: pwsh
        run: |
          # Desativa o cache global do pnpm e força estrutura clássica de node_modules
          Set-Content -Path .npmrc -Value "node-linker=hoisted`nside-effects-cache=false`nstore-dir=./.pnpm-store"

      - name: Instalar dependências (raiz)
        # Permite a execução dos scripts nativos e desativa o bloqueio do pnpm v10
        run: pnpm install --frozen-lockfile --config.allow-scripts=true

      - name: Forçar Download Manual do Electron Executável (Bypass de segurança)
        shell: pwsh
        env:
          # Força a API do Electron a baixar o binário de produção ignorando qualquer cache local
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
          FORCE_ELECTRON_DOWNLOAD: "true"
        run: |
          Write-Host "Iniciando limpeza e download forçado do Electron..."
          # Remove pastas fantasmas criadas pelo cache do repositório
          Remove-Item -Recurse -Force node_modules/electron/dist -ErrorAction SilentlyContinue
          Remove-Item -Force node_modules/electron/path.txt -ErrorAction SilentlyContinue
          
          # Executa diretamente via Node.js o script instalador oficial da dependência
          node node_modules/electron/install.js
          
          # Validação final rígida antes de prosseguir para o build
          $exePresente = Test-Path node_modules/electron/dist/electron.exe
          if (-not $exePresente) {
            Write-Error "::error::O arquivo electron.exe continua ausente após o download forçado!"
            exit 1
          } else {
            Write-Host "✅ SUCESSO ABSOLUTO: Binário electron.exe encontrado e pronto para o build."
          }

      - name: Gerar artefatos do Prisma ORM
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pdv_db"

      - name: Build (backend + frontend + desktop)
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Gerar instalador .msi
        env:
          DEBUG: electron-forge:*
        shell: pwsh
        run: |
          pnpm run make:win
          Write-Host "=== Processo de empacotamento concluído com código: $LASTEXITCODE ==="

      - name: Diagnóstico pós-build (Lista arquivos gerados)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path out) {
            Write-Host "=== Conteúdo da pasta out/make ==="
            Get-ChildItem -Recurse out\make -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            Write-Host "A pasta de saída 'out' nao foi gerada pelo Electron Forge."
          }

      - name: Publicar instaladores como artefato do GitHub
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-face-delivery-installers
          path: |
            out/make/**/*.msi
            out/make/**/*.exe
          if-no-files-found: error
