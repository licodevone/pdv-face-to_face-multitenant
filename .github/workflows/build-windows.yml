
name: Build Windows MSI

on:
  # Roda quando você criar uma tag de versão (ex.: v0.1.0)
  push:
    tags:
      - 'v*'
  # Permite disparar manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest   # <- precisa ser Windows por causa do WiX

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # WiX Toolset v3 (candle/light) — exigido pelo maker-wix
      - name: Instalar WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          # Garante candle.exe/light.exe no PATH dos próximos passos
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
                    Select-Object -First 1
          if ($wixBin) {
            echo "WiX bin encontrado: $wixBin"
            Add-Content -Path $env:GITHUB_PATH -Value $wixBin
          } else {
            echo "::warning::candle.exe nao encontrado apos instalar WiX"
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Instalar dependências (raiz)
        run: pnpm install --frozen-lockfile

      - name: Instalar dependências (frontend)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build (backend + frontend + desktop)
        run: pnpm build
        env:
          NODE_ENV: production
          # Coloque aqui as variáveis que o `next build` precisa em build-time:
          # DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Gerar instalador .msi
        shell: pwsh
        run: |
          $env:DEBUG = "electron-forge:*"
          pnpm run make:win
          Write-Host "make:win exit code = $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Listar saída do make (diagnóstico)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path out) {
            Get-ChildItem -Recurse out\make | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            echo "pasta 'out' nao existe"
          }

      - name: Publicar instaladores como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-face-delivery-installers
          path: |
            out/make/**/*.msi
            out/make/**/*.exe
          if-no-files-found: warn