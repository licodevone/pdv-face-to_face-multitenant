name: Build Windows MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # WiX Toolset v3 (candle/light) — exigido pelo maker-wix
      - name: Instalar WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          # Garante candle.exe/light.exe no PATH dos próximos passos
          $wixBin = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                    ForEach-Object { Join-Path $_.FullName "bin" } |
                    Where-Object { Test-Path (Join-Path $_ "candle.exe") } |
                    Select-Object -First 1
          if ($wixBin) {
            echo "WiX bin encontrado: $wixBin"
            Add-Content -Path $env:GITHUB_PATH -Value $wixBin
          } else {
            echo "::warning::candle.exe nao encontrado apos instalar WiX"
          }

       # Setup do pnpm e Node
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Instalar dependências (raiz)
        run: pnpm install --frozen-lockfile

      # Garante que o Prisma gere os clients/tipagens do Windows antes de tentar compilar o código
      - name: Gerar artefatos do Prisma ORM
        run: pnpm db:generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pdv_db"

      # O store do pnpm pode restaurar o Electron com dist/ parcial (so 'locales')
      # e o marcador path.txt, fazendo o install.js pular o download.
      - name: Garantir binário do Electron
        shell: pwsh
        run: |
          echo "ELECTRON_SKIP_BINARY_DOWNLOAD = '$env:ELECTRON_SKIP_BINARY_DOWNLOAD'"
          echo "npm_config_electron_skip_binary_download = '$env:npm_config_electron_skip_binary_download'"
          Remove-Item -Recurse -Force node_modules/electron/dist -ErrorAction SilentlyContinue
          Remove-Item -Force node_modules/electron/path.txt -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\electron\Cache" -ErrorAction SilentlyContinue
          $env:DEBUG = "@electron/get:*"
          node node_modules/electron/install.js
          Write-Host "install.js exit = $LASTEXITCODE"
          echo "=== conteudo dist apos install ==="
          Get-ChildItem node_modules/electron/dist -ErrorAction SilentlyContinue | Select-Object Name | Format-Table -AutoSize
          $ok = Test-Path node_modules/electron/dist/electron.exe
          echo "electron.exe presente? $ok"
          if (-not $ok) { echo "::error::Falha ao baixar o binario do Electron"; exit 1 }

      # Roda o build unificado do seu package.json (backend + frontend + desktop)
      - name: Build (backend + frontend + desktop)
        run: pnpm build
        env:
          NODE_ENV: production

      # Roda apenas se houver falha no build acima para te ajudar a debugar
      - name: Verificar binário do Electron (diagnóstico em falha)
        if: failure()
        shell: pwsh
        run: |
          echo "=== node_modules/electron existe? ==="
          Test-Path node_modules/electron
          echo "=== dist/electron.exe existe? ==="
          Test-Path node_modules/electron/dist/electron.exe
          echo "=== conteudo de node_modules/electron/dist ==="
          Get-ChildItem node_modules/electron/dist -ErrorAction SilentlyContinue | Select-Object Name, Length | Format-Table -AutoSize
          echo "=== electron --version ==="
          pnpm exec electron --version
          echo "exit: $LASTEXITCODE"

      # Removido o 'if: always()' para impedir que gere pacotes corrompidos caso o build falhe
      - name: Gerar instalador .msi
        env:
          DEBUG: electron-forge:*
        shell: pwsh
        run: |
          pnpm run make:win
          Write-Host "=== make exit code = $LASTEXITCODE ==="

      - name: Listar saída do make (diagnóstico)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path out) {
            Get-ChildItem -Recurse out\make | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            echo "pasta 'out' nao existe"
          }

      # Só publica os artefatos se o fluxo tiver sucesso até o final
      - name: Publicar instaladores como artefato
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-face-delivery-installers
          path: |
            out/make/**/*.msi
            out/make/**/*.exe
          if-no-files-found: error
